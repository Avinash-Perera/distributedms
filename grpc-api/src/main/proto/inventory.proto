syntax = "proto3";

option java_multiple_files = true;
package com.avinash.grpc;

service InventoryGrpcService {
    rpc CheckInventory (InventoryRequest) returns (InventoryResponse);
}

message InventoryRequest {
    string productId = 1;
    int32 quantity = 2;
}

message InventoryResponse {
    bool available = 1;
}
