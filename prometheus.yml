global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'spring-boot-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
        - 'host.docker.internal:8080' # API Gateway
        - 'host.docker.internal:8081' # Order Service
        - 'host.docker.internal:8082' # Inventory Service
        - 'host.docker.internal:8083' # Payment Service
        - 'host.docker.internal:8084' # Fulfillment Service
        - 'host.docker.internal:8085' # Notification Service
